<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Journal - Abe Drechsler</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', 'Futura', sans-serif;
            color: #333;
            background-color: #fff;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 0;
            border-bottom: 1px solid #f0f0f0;
            margin-bottom: 50px;
        }
        .nav-logo {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .nav-logo:hover { color: #007bff; }
        .nav-right { display: flex; gap: 25px; align-items: center; }
        .nav-icons { display: flex; gap: 15px; }
        .nav-icons a { color: #555; text-decoration: none; transition: color 0.3s ease; font-size: 18px; }
        .nav-icons a:hover { color: #007bff; }
        .nav-about { color: #555; text-decoration: none; font-size: 14px; transition: color 0.3s ease; }
        .nav-about:hover { color: #007bff; }

        .page-header { margin-bottom: 50px; }
        .page-title { font-size: 42px; font-weight: 700; color: #333; margin-bottom: 12px; }
        .page-tagline { font-size: 16px; color: #888; font-weight: 400; }

        .loading { display: flex; justify-content: center; align-items: center; min-height: 300px; }
        .spinner {
            border: 3px solid #f0f0f0;
            border-top: 3px solid #007bff;
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Post list */
        .post-list { margin-bottom: 60px; }
        .post-item {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 20px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .post-item:first-child { border-top: 1px solid #f0f0f0; }
        .post-item-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .post-item-title:hover { color: #007bff; }
        .post-item-meta {
            font-size: 14px;
            color: #888;
            white-space: nowrap;
            margin-left: 20px;
        }

        /* Single post view */
        .post-single { display: none; margin-bottom: 60px; }
        .post-single .back-link {
            display: inline-block;
            color: #007bff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 30px;
        }
        .post-single .back-link:hover { text-decoration: underline; }
        .post-single .post-meta {
            display: flex;
            gap: 20px;
            font-size: 14px;
            color: #888;
            margin-bottom: 15px;
        }
        .post-single .post-title {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.3;
        }
        .post-single .post-body {
            font-family: 'Georgia', 'Garamond', serif;
            font-size: 17px;
            color: #444;
            line-height: 1.9;
            white-space: pre-wrap;
        }
        .post-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 30px; }
        .tag {
            display: inline-block;
            background-color: #f0f0f0;
            color: #555;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .empty-state { text-align: center; padding: 60px 20px; color: #888; }
        .empty-state-icon { font-size: 48px; margin-bottom: 20px; color: #ddd; }

        @media (max-width: 768px) {
            .page-title { font-size: 32px; }
            nav { flex-direction: column; gap: 20px; text-align: center; }
            .nav-right { flex-direction: column; gap: 15px; }
            .post-item { flex-direction: column; gap: 5px; }
            .post-item-meta { margin-left: 0; }
            .post-single .post-title { font-size: 26px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="../../index.html" class="nav-logo">Abe Drechsler</a>
            <div class="nav-right">
                <div class="nav-icons">
                    <a href="https://twitter.com" target="_blank" rel="noopener noreferrer"><i class="fab fa-twitter"></i></a>
                    <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer"><i class="fab fa-linkedin"></i></a>
                </div>
                <a href="../../about.html" class="nav-about">About</a>
            </div>
        </nav>

        <div class="page-header">
            <h1 class="page-title">Kids Journal</h1>
            <p class="page-tagline">Thomas and Eloise share their adventures</p>
        </div>

        <div id="loading" class="loading"><div class="spinner"></div></div>

        <!-- Post List -->
        <div id="post-list" class="post-list" style="display: none;"></div>

        <!-- Single Post View -->
        <div id="post-single" class="post-single"></div>

        <!-- Empty State -->
        <div id="empty-state" style="display: none;">
            <div class="empty-state">
                <div class="empty-state-icon"><i class="fas fa-book"></i></div>
                <p>No posts yet — check back soon!</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://swaplrbpwdfvzttxyyht.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_tMlXyklg4sSh7XsaeHdyYA_oXEFgLRz';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let allPosts = [];

        async function init() {
            try {
                const { data, error } = await db
                    .from('content')
                    .select('*')
                    .eq('blog_post_status', 'published')
                    .eq('content_category', 'kids-journal')
                    .order('recorded_date', { ascending: false });

                if (error || !data || data.length === 0) {
                    showEmptyState();
                    return;
                }

                allPosts = data;

                // Check URL for post id
                const params = new URLSearchParams(window.location.search);
                const postId = params.get('post');

                if (postId) {
                    const post = allPosts.find(p => p.id === postId);
                    if (post) {
                        showPost(post);
                    } else {
                        showList();
                    }
                } else {
                    showList();
                }
            } catch (err) {
                console.error('Error:', err);
                showEmptyState();
            }
        }

        function showList() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('post-single').style.display = 'none';
            document.getElementById('empty-state').style.display = 'none';
            const list = document.getElementById('post-list');
            list.style.display = 'block';
            list.innerHTML = '';

            allPosts.forEach(post => {
                const item = document.createElement('div');
                item.className = 'post-item';
                const date = formatDate(post.recorded_date);
                const author = post.child_name ? ` · ${escapeHtml(post.child_name)}` : '';
                item.innerHTML = `
                    <a href="?post=${post.id}" class="post-item-title">${escapeHtml(post.title || 'Untitled')}</a>
                    <span class="post-item-meta">${date}${author}</span>
                `;
                list.appendChild(item);
            });
        }

        function showPost(post) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('post-list').style.display = 'none';
            document.getElementById('empty-state').style.display = 'none';

            const single = document.getElementById('post-single');
            single.style.display = 'block';

            const bodyText = post.blog_post_edited || post.blog_post_draft || '';
            const date = formatDate(post.recorded_date);
            const author = post.child_name || 'Anonymous';
            const tags = post.content_tags || [];

            let tagsHTML = '';
            if (Array.isArray(tags) && tags.length > 0) {
                tagsHTML = `<div class="post-tags">${tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>`;
            }

            single.innerHTML = `
                <a href="?" class="back-link"><i class="fas fa-chevron-left"></i> Back to all posts</a>
                <div class="post-meta">
                    <span>${date}</span>
                    <span>by ${escapeHtml(author)}</span>
                </div>
                <h1 class="post-title">${escapeHtml(post.title || 'Untitled')}</h1>
                <div class="post-body">${escapeHtml(bodyText)}</div>
                ${tagsHTML}
            `;

            window.scrollTo(0, 0);
        }

        function formatDate(dateString) {
            if (!dateString) return 'Unknown Date';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showEmptyState() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('empty-state').style.display = 'block';
        }

        // Handle browser back/forward
        window.addEventListener('popstate', () => {
            const params = new URLSearchParams(window.location.search);
            const postId = params.get('post');
            if (postId) {
                const post = allPosts.find(p => p.id === postId);
                if (post) showPost(post);
                else showList();
            } else {
                showList();
            }
        });

        init();
    </script>
</body>
</html>
